# Change these first
owner: edp163 # Your GitHub organization or username, where this repository lives
repo: supermoon-stat # The name of this repository

sites:
  - name: Supermoon Connector
    url: https://cloudflare.com
    method: GET
    headers:
      - "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
      - "Content-Type: application/json"
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"status":"healthy"'

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: supermoon-stat.pages.dev
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/edp163/supermoon-stat/refs/heads/master/assets/teleskop.svg
  name: Teleskop
  introTitle: "**Teleskop** merupakan layanan monitoring status server Supermoon, menggunakan Upptime dan GitHub."
  introMessage: Berikut adalah status koneksi **real-time** dari Supermoon. menggunakan GitHub Actions, Issues, dan CF Pages. 🔔 Notif telegram akan dikirim ketika koneksi Down.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
